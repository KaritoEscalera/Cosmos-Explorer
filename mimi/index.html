<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Punto de Venta - Mini Super</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="header">
    <h1>Mini Super POS</h1>
    <button class="logout">Cerrar sesión</button>
  </header>

  <main class="container">

    <section class="products">
      <h2>Productos</h2>
      <input type="text" placeholder="Buscar producto..." class="search">

      <div class="product-list">
        <div class="product-card">
          <h3>Refresco 600ml</h3>
          <p>$18.00</p>
          <button>Agregar</button>
        </div>

        <div class="product-card">
          <h3>Pan Blanco</h3>
          <p>$35.00</p>
          <button>Agregar</button>
        </div>
      </div>
    </section>

    <section class="cart">
      <h2>Venta Actual</h2>
      <div class="cart-items">
        <p>Refresco 600ml x1 - $18.00</p>
      </div>

      <div class="total">
        <h3>Total: $18.00</h3>
        <button class="pay">Cobrar</button>
      </div>
    </section>

  </main>

</body>
</html>
